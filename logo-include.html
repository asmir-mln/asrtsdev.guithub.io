<!-- ============================================

<!--
UTILISATION :

1. Ajouter dans le <head> de chaque page :
   <link rel="stylesheet" href="logo-style.css">

2. Ajouter juste après l'ouverture du <body> :
   Le code HTML du logo (voir ci-dessus)

3. Choisir la variante selon la page :
   - Logo normal : pages claires
   - Logo dark-mode : pages avec fond sombre
   - Logo minimal : pages avec peu d'espace
   - Logo avec blason : pages premium/spéciales

EXEMPLES PAR PAGE :

- index.html : Logo normal
- musee.html : Logo dark-mode (fond bleu foncé)
- livres-audio.html : Logo dark-mode (fond sombre)
- commande.html : Logo normal
- contact.html : Logo normal
- attestation-partenariat.html : Logo minimal

PERSONNALISATION :

Pour changer la couleur or (#d4af37) :
- Modifier dans logo-style.css
- Variables à changer : #d4af37, #f4d03f

Pour changer la position :
- Modifier top/left dans .asartsdev-logo

Pour masquer sur certaines pages :
- Ajouter : .asartsdev-logo { display: none; }
-->
